# ─────────────────────────────────────────────────────────────────────────────
# Publish Central DS — Builds the umbrella package (bundling all sub-packages)
# and publishes to GitHub Packages.
#
# The sub-packages are private (GitHub Packages), so central-ds bundles their
# code at build time — consumers only need this single package.
#
# Triggered by:
#   1. repository_dispatch from publish-packages.yml (after sub-packages update)
#   2. Manual workflow_dispatch for ad-hoc releases
# ─────────────────────────────────────────────────────────────────────────────
name: Publish Central DS

on:
  repository_dispatch:
    types: [sub-package-published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    name: Build, bundle & publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@symphony-ai"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version bump
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          else
            BUMP="patch"
          fi
          echo "type=${BUMP}" >> $GITHUB_OUTPUT
          echo "📈 Version bump: ${BUMP}"

      - name: Bump central-ds version
        id: new-version
        run: |
          cd packages/central-ds
          CURRENT=$(jq -r '.version' package.json)

          IFS='.' read -r major minor patch <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEW_VERSION="${major}.${minor}.${patch}"

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${CURRENT} → ${NEW_VERSION}"

      - name: Build all packages (sub-packages first, then central-ds bundles them)
        run: pnpm build

      - name: Verify bundle has no external workspace deps
        run: |
          echo "Checking that dist doesn't reference private packages..."
          if grep -r "@symphony-ai/central-ds-react\|@symphony-ai/central-ds-icons\|@symphony-ai/central-ds-variables" packages/central-ds/dist/*.js packages/central-ds/dist/*.cjs 2>/dev/null; then
            echo "❌ ERROR: Bundle still references private workspace packages!"
            exit 1
          else
            echo "✅ Bundle is self-contained — no private package references"
          fi

      - name: Publish central-ds to GitHub Packages
        run: pnpm --filter @symphony-ai/central-ds publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get sub-package versions for release notes
        id: sub-versions
        run: |
          echo "react=$(jq -r '.version' packages/react/package.json)" >> $GITHUB_OUTPUT
          echo "icons=$(jq -r '.version' packages/icons/package.json)" >> $GITHUB_OUTPUT
          echo "variables=$(jq -r '.version' packages/variables/package.json)" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/central-ds/package.json
          git commit -m "chore: release @symphony-ai/central-ds@${{ steps.new-version.outputs.version }}

          Bundled sub-packages:
            - @symphony-ai/central-ds-react: ${{ steps.sub-versions.outputs.react }}
            - @symphony-ai/central-ds-icons: ${{ steps.sub-versions.outputs.icons }}
            - @symphony-ai/central-ds-variables: ${{ steps.sub-versions.outputs.variables }}" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.new-version.outputs.version }}"
          name: "@symphony-ai/central-ds@${{ steps.new-version.outputs.version }}"
          body: |
            ## @symphony-ai/central-ds@${{ steps.new-version.outputs.version }}

            ### Bundled Sub-Packages
            | Package | Version |
            |---------|---------|
            | `@symphony-ai/central-ds-react` | `${{ steps.sub-versions.outputs.react }}` |
            | `@symphony-ai/central-ds-icons` | `${{ steps.sub-versions.outputs.icons }}` |
            | `@symphony-ai/central-ds-variables` | `${{ steps.sub-versions.outputs.variables }}` |

            ### Install
            ```bash
            npm install @symphony-ai/central-ds@${{ steps.new-version.outputs.version }} --registry=https://npm.pkg.github.com
            ```

            > **Note:** This package bundles all sub-packages. No additional installs needed.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
