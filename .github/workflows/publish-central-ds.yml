# ─────────────────────────────────────────────────────────────────────────────
# Publish Central DS — Automatically updates the umbrella package with the
# latest sub-package versions and publishes to npm.
#
# Triggered by:
#   1. repository_dispatch from publish-packages.yml (after sub-packages publish)
#   2. Manual workflow_dispatch for ad-hoc releases
# ─────────────────────────────────────────────────────────────────────────────
name: Publish Central DS

on:
  repository_dispatch:
    types: [sub-package-published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  update-and-publish:
    name: Update dependencies & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get latest sub-package versions from npm
        id: versions
        run: |
          get_npm_version() {
            local pkg_name=$1
            local version=$(npm view "${pkg_name}" version 2>/dev/null || echo "")
            echo "$version"
          }

          REACT_VERSION=$(get_npm_version "@symphony-ai/central-ds-react")
          ICONS_VERSION=$(get_npm_version "@symphony-ai/central-ds-icons")
          VARIABLES_VERSION=$(get_npm_version "@symphony-ai/central-ds-variables")

          echo "react=${REACT_VERSION}" >> $GITHUB_OUTPUT
          echo "icons=${ICONS_VERSION}" >> $GITHUB_OUTPUT
          echo "variables=${VARIABLES_VERSION}" >> $GITHUB_OUTPUT

          echo "📦 Latest versions:"
          echo "  react:     ${REACT_VERSION}"
          echo "  icons:     ${ICONS_VERSION}"
          echo "  variables: ${VARIABLES_VERSION}"

      - name: Update central-ds dependencies
        run: |
          cd packages/central-ds

          # Update dependencies to use exact published versions
          jq --arg react "${{ steps.versions.outputs.react }}" \
             --arg icons "${{ steps.versions.outputs.icons }}" \
             --arg variables "${{ steps.versions.outputs.variables }}" \
             '.dependencies["@symphony-ai/central-ds-react"] = $react |
              .dependencies["@symphony-ai/central-ds-icons"] = $icons |
              .dependencies["@symphony-ai/central-ds-variables"] = $variables' \
             package.json > package.json.tmp && mv package.json.tmp package.json

          echo "📝 Updated package.json dependencies"
          jq '.dependencies' package.json

      - name: Determine version bump
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          else
            BUMP="patch"
          fi
          echo "type=${BUMP}" >> $GITHUB_OUTPUT
          echo "📈 Version bump: ${BUMP}"

      - name: Bump central-ds version
        id: new-version
        run: |
          cd packages/central-ds
          CURRENT=$(jq -r '.version' package.json)

          IFS='.' read -r major minor patch <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEW_VERSION="${major}.${minor}.${patch}"

          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${CURRENT} → ${NEW_VERSION}"

      - name: Reinstall with updated versions
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck
        run: pnpm --filter @symphony-ai/central-ds typecheck || true

      - name: Publish central-ds
        run: pnpm --filter @symphony-ai/central-ds publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit updated versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/central-ds/package.json pnpm-lock.yaml
          git commit -m "chore: release @symphony-ai/central-ds@${{ steps.new-version.outputs.version }}

          Updated dependencies:
            - @symphony-ai/central-ds-react: ${{ steps.versions.outputs.react }}
            - @symphony-ai/central-ds-icons: ${{ steps.versions.outputs.icons }}
            - @symphony-ai/central-ds-variables: ${{ steps.versions.outputs.variables }}" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.new-version.outputs.version }}"
          name: "@symphony-ai/central-ds@${{ steps.new-version.outputs.version }}"
          body: |
            ## @symphony-ai/central-ds@${{ steps.new-version.outputs.version }}

            ### Dependencies
            | Package | Version |
            |---------|---------|
            | `@symphony-ai/central-ds-react` | `${{ steps.versions.outputs.react }}` |
            | `@symphony-ai/central-ds-icons` | `${{ steps.versions.outputs.icons }}` |
            | `@symphony-ai/central-ds-variables` | `${{ steps.versions.outputs.variables }}` |

            ### Install
            ```bash
            npm install @symphony-ai/central-ds@${{ steps.new-version.outputs.version }}
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
